# yaml-language-server: $schema=https://gist.githubusercontent.com/sargunv/c2ca41a08391cd06feaad97aece309e4/raw/empty-json-schema.json
# Aligned with hear-the-music-tree-api: main or prerelease tag → STAGING + staging; release tag → PROD + prod.
# `deployment_environment` is the GitHub Environment (STAGING / PROD); `env` is the slug passed to org workflows (staging / prod).
name: Publish

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      env: ${{ steps.version.outputs.env }}
      deployment_environment: ${{ steps.version.outputs.deployment_environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0

      - name: Set version and environment
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "$VERSION" == *-* ]]; then
              {
                echo "app_version=$VERSION"
                echo "image_tag=$VERSION"
                echo "env=staging"
                echo "deployment_environment=STAGING"
              } >> "$GITHUB_OUTPUT"
              echo "Prerelease/dev tag -> STAGING, staging"
            else
              {
                echo "app_version=$VERSION"
                echo "image_tag=$VERSION"
                echo "env=prod"
                echo "deployment_environment=PROD"
              } >> "$GITHUB_OUTPUT"
              echo "Release tag -> PROD, production"
            fi
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            VERSION=$(tr -d '[:space:]' < VERSION)
            if [ -z "$VERSION" ]; then
              echo "Error: VERSION file is empty or missing."
              exit 1
            fi
            {
              echo "app_version=${VERSION}-staging"
              echo "image_tag=staging"
              echo "env=staging"
              echo "deployment_environment=STAGING"
            } >> "$GITHUB_OUTPUT"
            echo "Main push -> STAGING, staging"
          else
            echo "Error: Unsupported ref '$GITHUB_REF'."
            echo "Only 'main' branch or tags matching 'v*' are supported."
            exit 1
          fi

  build-and-push:
    name: Docker image
    needs: [determine-version]
    uses: ./.github/workflows/build-and-push.yml
    with:
      app_version: ${{ needs.determine-version.outputs.app_version }}
      image_tag: ${{ needs.determine-version.outputs.image_tag }}
      environment: ${{ needs.determine-version.outputs.deployment_environment }}
    secrets: inherit

  check-pinned-tags:
    name: Check deploy vars
    runs-on: ubuntu-latest
    needs: [determine-version]
    environment: ${{ needs.determine-version.outputs.deployment_environment }}
    steps:
      - name: Require deploy and app-name vars (set-image-tag-on-server)
        run: |
          missing=""
          [ -z "${REDEPLOYMENT_ROOT}" ] && missing="${missing} REDEPLOYMENT_ROOT"
          [ -z "${TMD_ADMIN_API_APP_NAME}" ] && missing="${missing} TMD_ADMIN_API_APP_NAME"
          [ -z "${TMD_ADMIN_REDEPLOYMENT_HOOK_ID_BASE}" ] && missing="${missing} TMD_ADMIN_REDEPLOYMENT_HOOK_ID_BASE"
          if [ -n "$missing" ]; then
            echo "ERROR: Set org-level (or this repo) Variables:$missing"
            echo "Example REDEPLOYMENT_ROOT=/var/webhook/redeployment-the-music-deck-admin (match BehindTheMusicTree/infrastructure)"
            echo "Example TMD_ADMIN_REDEPLOYMENT_HOOK_ID_BASE=the-music-deck-admin-redeploy (same value as infra; required so call-redeployment-webhook uses TMD_ADMIN_WEBHOOK_SECRET_*)"
            exit 1
          fi
        env:
          REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
          TMD_ADMIN_API_APP_NAME: ${{ vars.TMD_ADMIN_API_APP_NAME }}
          TMD_ADMIN_REDEPLOYMENT_HOOK_ID_BASE: ${{ vars.TMD_ADMIN_REDEPLOYMENT_HOOK_ID_BASE }}

  set-version-api:
    name: Set API version on server
    needs: [build-and-push, determine-version, check-pinned-tags]
    uses: BehindTheMusicTree/github-workflows/.github/workflows/set-image-tag-on-server.yml@main
    with:
      env: ${{ needs.determine-version.outputs.env }}
      tag: ${{ needs.determine-version.outputs.image_tag }}
      app_name: ${{ vars.TMD_ADMIN_API_APP_NAME }}
    secrets: inherit

  redeploy-webhook-call:
    name: Redeploy webhook
    needs:
      [build-and-push, set-version-api, check-pinned-tags, determine-version]
    uses: BehindTheMusicTree/github-workflows/.github/workflows/call-redeployment-webhook.yml@v0.3.0
    with:
      env: ${{ needs.determine-version.outputs.env }}
      hook_id_base: ${{ vars.TMD_ADMIN_REDEPLOYMENT_HOOK_ID_BASE }}
    secrets: inherit
