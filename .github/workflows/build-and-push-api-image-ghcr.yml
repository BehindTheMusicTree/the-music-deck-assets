name: Build and push API image (GHCR)

on:
  workflow_call:
    inputs:
      commit_hash:
        description: "Commit hash to build from (optional)"
        required: false
        type: string
      app_version:
        description: "App version (build-arg APP_VERSION for display in container)"
        required: true
        type: string
      image_tag:
        description: "Image tag to push (e.g. staging on main, semver on release tags)"
        required: true
        type: string
      environment:
        description: "GitHub Environment (STAGING or PROD) for vars/secrets"
        required: false
        type: string
        default: STAGING

permissions:
  contents: read
  packages: write

jobs:
  docker-build-push:
    name: Docker build & push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'STAGING' }}
    env:
      APP_VERSION: ${{ inputs.app_version }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit_hash || github.sha }}

      - name: Check required vars
        env:
          GHCR_IMAGE_NAMESPACE: ${{ vars.GHCR_IMAGE_NAMESPACE }}
          TMD_ADMIN_API_APP_NAME: ${{ vars.TMD_ADMIN_API_APP_NAME }}
        run: bash scripts/check-workflow-env.sh GHCR_IMAGE_NAMESPACE TMD_ADMIN_API_APP_NAME

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_FULL_NAME: ghcr.io/${{ vars.GHCR_IMAGE_NAMESPACE }}/${{ vars.TMD_ADMIN_API_APP_NAME }}:${{ env.IMAGE_TAG }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_FULL_NAME }}
          build-args: |
            APP_VERSION=${{ inputs.app_version }}
