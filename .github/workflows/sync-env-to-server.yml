# yaml-language-server: $schema=https://gist.githubusercontent.com/sargunv/c2ca41a08391cd06feaad97aece309e4/raw/empty-json-schema.json
# Sync Nest API + Postgres compose env fragments to the VPS (BehindTheMusicTree/github-workflows).
# Same pattern as hear-the-music-tree-api: build fragment per env → artifact → reusable sync-env-to-server.
# Uploads /tmp/sync-env-<app>-<env>.env and merges keys into {REDEPLOYMENT_ROOT}-{env}/scripts/.env (reusable).
# Infra redeploy promotes /tmp into scripts/sync-env/ then apply-tmd-admin-env-from-sync → compose/*.env (DATABASE_URL / CORS from scripts/.env + sync; see infrastructure).
# Postgres fragment basename: TMD_ADMIN_API_APP_NAME + DB_APP_NAME_SUFFIX (same GitHub Variable as infrastructure / hear-the-music-tree-api; required, no default).
# DB fragment: POSTGRES_* = bootstrap superuser; POSTGRES_APP_* = Nest DATABASE_URL role (docker-entrypoint-initdb.d on first PGDATA init — see infrastructure).
# Nest PORT is set on the server from infrastructure only (TMD_ADMIN_API_LISTEN_PORT in scripts/.env); do not put PORT in this fragment.
name: Sync env to server

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-api-fragment:
    name: Build API env fragment (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: STAGING
            sync_env: staging
          - environment: PROD
            sync_env: prod
    environment: ${{ matrix.environment }}
    steps:
      - name: Validate vars and build API fragment
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_DEPLOY_USERNAME: ${{ secrets.SERVER_DEPLOY_USERNAME }}
          SERVER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}
          REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
          TMD_ADMIN_API_APP_NAME: ${{ vars.TMD_ADMIN_API_APP_NAME }}
          DB_APP_NAME_SUFFIX: ${{ vars.DB_APP_NAME_SUFFIX }}
          TMD_ADMIN_NODE_ENV: ${{ vars.TMD_ADMIN_NODE_ENV }}
          TMD_ADMIN_DB_APP_USER: ${{ vars.TMD_ADMIN_DB_APP_USER }}
          TMD_ADMIN_DB_APP_USER_PASSWORD: ${{ secrets.TMD_ADMIN_DB_APP_USER_PASSWORD }}
        run: |
          set -euo pipefail
          : > fragment.env
          node_env="${TMD_ADMIN_NODE_ENV:-production}"
          printf '%s\n' "NODE_ENV=${node_env}" >> fragment.env
          required=(
            SERVER_HOST REDEPLOYMENT_ROOT TMD_ADMIN_API_APP_NAME DB_APP_NAME_SUFFIX
            SERVER_DEPLOY_USERNAME SERVER_DEPLOY_SSH_PRIVATE_KEY TMD_ADMIN_DB_APP_USER_PASSWORD
          )
          missing=()
          for v in "${required[@]}"; do
            eval "chk=\${$v-}"
            [ -z "${chk}" ] && missing+=("$v")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Missing required vars or secrets: ${missing[*]}"
            exit 1
          fi
          app_user="${TMD_ADMIN_DB_APP_USER:-tmd_admin_app}"
          app_pw="$(printf '%s' "${TMD_ADMIN_DB_APP_USER_PASSWORD}" | tr -d '\n\r')"
          printf '%s\n' "TMD_ADMIN_SYNC_DATABASE_USER=${app_user}" >> fragment.env
          printf 'TMD_ADMIN_SYNC_DATABASE_PASSWORD=%s\n' "${app_pw}" >> fragment.env
          echo "API fragment ready for ${{ matrix.sync_env }}."

      - name: Upload API fragment artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: sync-env-fragment-api-${{ matrix.sync_env }}
          path: fragment.env

  build-db-fragment:
    name: Build Postgres env fragment (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: STAGING
            sync_env: staging
          - environment: PROD
            sync_env: prod
    environment: ${{ matrix.environment }}
    steps:
      - name: Validate vars and build DB fragment
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_DEPLOY_USERNAME: ${{ secrets.SERVER_DEPLOY_USERNAME }}
          SERVER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}
          REDEPLOYMENT_ROOT: ${{ vars.REDEPLOYMENT_ROOT }}
          TMD_ADMIN_API_APP_NAME: ${{ vars.TMD_ADMIN_API_APP_NAME }}
          DB_APP_NAME_SUFFIX: ${{ vars.DB_APP_NAME_SUFFIX }}
          TMD_ADMIN_DB_POSTGRES_DB_NAME: ${{ vars.TMD_ADMIN_DB_POSTGRES_DB_NAME }}
          TMD_ADMIN_DB_SUPERUSER_USERNAME: ${{ vars.TMD_ADMIN_DB_SUPERUSER_USERNAME }}
          TMD_ADMIN_DB_SUPERUSER_PASSWORD: ${{ secrets.TMD_ADMIN_DB_SUPERUSER_PASSWORD }}
          TMD_ADMIN_DB_APP_USER: ${{ vars.TMD_ADMIN_DB_APP_USER }}
          TMD_ADMIN_DB_APP_USER_PASSWORD: ${{ secrets.TMD_ADMIN_DB_APP_USER_PASSWORD }}
        run: |
          set -euo pipefail
          : > fragment.env
          api="${TMD_ADMIN_API_APP_NAME:?TMD_ADMIN_API_APP_NAME must be set}"
          if [ -z "${DB_APP_NAME_SUFFIX:-}" ]; then
            echo "ERROR: GitHub Variable DB_APP_NAME_SUFFIX must be set and non-empty (same value as BehindTheMusicTree/infrastructure)."
            exit 1
          fi
          db_app_name="${api}${DB_APP_NAME_SUFFIX}"
          pg_user="${TMD_ADMIN_DB_SUPERUSER_USERNAME:-postgres}"
          pg_db="${TMD_ADMIN_DB_POSTGRES_DB_NAME:-app}"
          app_user="${TMD_ADMIN_DB_APP_USER:-tmd_admin_app}"
          required=(
            SERVER_HOST REDEPLOYMENT_ROOT TMD_ADMIN_API_APP_NAME DB_APP_NAME_SUFFIX
            SERVER_DEPLOY_USERNAME SERVER_DEPLOY_SSH_PRIVATE_KEY TMD_ADMIN_DB_SUPERUSER_PASSWORD
            TMD_ADMIN_DB_APP_USER_PASSWORD
          )
          missing=()
          for v in "${required[@]}"; do
            eval "val=\${$v-}"
            [ -z "${val}" ] && missing+=("$v")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Missing required vars or secrets: ${missing[*]}"
            exit 1
          fi
          pw="$(printf '%s' "${TMD_ADMIN_DB_SUPERUSER_PASSWORD}" | tr -d '\n\r')"
          app_pw="$(printf '%s' "${TMD_ADMIN_DB_APP_USER_PASSWORD}" | tr -d '\n\r')"
          printf '%s\n' "POSTGRES_USER=${pg_user}" "POSTGRES_DB=${pg_db}" >> fragment.env
          printf 'POSTGRES_PASSWORD=%s\n' "${pw}" >> fragment.env
          printf '%s\n' "POSTGRES_APP_USER=${app_user}" >> fragment.env
          printf 'POSTGRES_APP_PASSWORD=%s\n' "${app_pw}" >> fragment.env
          echo "DB fragment ready for ${{ matrix.sync_env }} (service basename ${db_app_name} = API + DB_APP_NAME_SUFFIX)."

      - name: Upload DB fragment artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: sync-env-fragment-db-${{ matrix.sync_env }}
          path: fragment.env

  sync-api-staging:
    name: Sync API env (staging)
    needs: [build-api-fragment]
    uses: BehindTheMusicTree/github-workflows/.github/workflows/sync-env-to-server.yml@main
    with:
      sync_env: staging
      fragment_artifact: sync-env-fragment-api-staging/fragment.env
      app_name: ${{ vars.TMD_ADMIN_API_APP_NAME }}
    secrets: inherit

  sync-api-prod:
    name: Sync API env (prod)
    needs: [build-api-fragment]
    uses: BehindTheMusicTree/github-workflows/.github/workflows/sync-env-to-server.yml@main
    with:
      sync_env: prod
      fragment_artifact: sync-env-fragment-api-prod/fragment.env
      app_name: ${{ vars.TMD_ADMIN_API_APP_NAME }}
    secrets: inherit

  sync-db-staging:
    name: Sync DB env (staging)
    needs: [build-db-fragment]
    uses: BehindTheMusicTree/github-workflows/.github/workflows/sync-env-to-server.yml@main
    with:
      sync_env: staging
      fragment_artifact: sync-env-fragment-db-staging/fragment.env
      app_name: ${{ format('{0}{1}', vars.TMD_ADMIN_API_APP_NAME, vars.DB_APP_NAME_SUFFIX) }}
    secrets: inherit

  sync-db-prod:
    name: Sync DB env (prod)
    needs: [build-db-fragment]
    uses: BehindTheMusicTree/github-workflows/.github/workflows/sync-env-to-server.yml@main
    with:
      sync_env: prod
      fragment_artifact: sync-env-fragment-db-prod/fragment.env
      app_name: ${{ format('{0}{1}', vars.TMD_ADMIN_API_APP_NAME, vars.DB_APP_NAME_SUFFIX) }}
    secrets: inherit
